# Default configuration for adversarial attack experiments.
dataset: mnist          # mnist | cifar10
data_dir: ./data
batch_size: 128
num_workers: 2

# Training
train:
  epochs: 1
  lr: 0.001
  device: cpu           # cpu | cuda

# Attacks and the epsilon sweep to evaluate over.
attacks: [fgsm, pgd, cw]
epsilons: [0.0, 0.05, 0.1, 0.15, 0.2, 0.3]

# Per-attack hyperparameters.
pgd:
  alpha: 0.01
  steps: 40
cw:
  c: 1.0
  steps: 50
  lr: 0.01

seed: 0
output_dir: ./outputs
